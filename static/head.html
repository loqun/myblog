{{define "head.html"}}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Dosis:wght@500&display=swap" rel="stylesheet">
    
    <style>
        .title { font-family: "Libre Baskerville", serif; }
        .text-body { font-family: "Dosis", sans-serif; }
        
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            background-image: url("data:image/svg+xml,%3Csvg width='120' height='60' viewBox='0 0 120 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23cbd5e1' fill-opacity='0.4'%3E%3Cpath d='M0 30c20-8 40-8 60 0s40 8 60 0v2c-20 8-40 8-60 0s-40-8-60 0v-2z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            background-size: 120px 60px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .blog-card {
            transition: all 0.3s ease;
            padding: 1rem;
            border-radius: 4px;
        }
        .blog-card:hover {
            background-color: #1f2937;
            color: white;
        }
        .blog-card:hover h3 { color: white; }
        .blog-card:hover p { color: #d1d5db; }
        .blog-card:hover .text-gray-500 { color: #9ca3af; }
        .blog-card:hover .bg-gray-100 {
            background-color: #374151;
            color: #e5e7eb;
        }
        .blog-card:hover a { color: #e5e7eb; }
        
        .date-divider::before {
            content: "";
            display: inline-block;
            width: 4px;
            height: 4px;
            background: #6b7280;
            border-radius: 50%;
            margin: 0 8px;
            vertical-align: middle;
        }
        
        .prose a {
            color: #2563eb;
            text-decoration: underline;
            font-weight: 500;
        }
        
        .prose a:hover {
            color: #1d4ed8;
            text-decoration: none;
        }
        
        .ql-editor {
            min-height: 250px;
            font-family: "Dosis", sans-serif;
        }

        .toast {
            font-family: "Dosis", sans-serif !important;
            border-radius: 8px !important;
        }
        .toast-success {
            background-color: #1f2937 !important;
            color: white !important;
        }

        /* Select2 custom styling */
        .select2-container--default .select2-selection--multiple {
            border: 1px solid #d1d5db !important;
            border-radius: 0.375rem !important;
            padding: 0.5rem 0.75rem !important;
            font-family: "Libre Baskerville", serif !important;
            min-height: 42px !important;
        }

        .select2-container--default .select2-selection--multiple:focus {
            border-color: #3b82f6 !important;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5) !important;
        }

        .select2-container--default
            .select2-selection--multiple
            .select2-selection__choice {
            background-color: #f3f4f6 !important;
            border: 1px solid #d1d5db !important;
            border-radius: 0.375rem !important;
            color: #374151 !important;
            font-family: "Dosis", sans-serif !important;
            font-size: 0.875rem !important;
        }

        .select2-dropdown {
            border: 1px solid #d1d5db !important;
            border-radius: 0.375rem !important;
            font-family: "Dosis", sans-serif !important;
        }

        .select2-search__field--inline {
            margin: 0 !important;
        }

        .select2-selection select2-selection--multiple{
            display: inline-flex;
        }

        .select2-search__field {
            display: flex !important;
            align-items: center !important;
            margin: 0 !important;
            font-family: "libre baskerville", serif !important;
        }

        textarea.select2-search__field {
            min-height: 18px !important;
        }

        .select2-selection__choice {
            margin-top: 0 !important;
            margin-right: 2px !important;
        }

        .select2-selection--multiple{
            display: flex !important;
            align-items: center !important;
        }
    </style>
</head>
{{end}}
