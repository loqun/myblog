<!DOCTYPE html>
<html lang="en">
{{template "head.html" .}}
</head>
<body>
    {{template "navbar.html" .}}

    <main class="mx-auto min-w-4xl max-w-4xl px-6 py-12 bg-white/95 backdrop-blur-sm border-x-2 flex-1 shadow-sm">
        <article>
            <header class="mb-8 border-b border-gray-100 pb-6">
                <h1 class="title text-4xl font-bold text-gray-900 mb-4">{{.Blog.Title}}</h1>
                <div class="flex items-center text-body text-gray-600">
                    <span>By {{.Blog.Author}}</span>
                    <span class="mx-2">•</span>
                    <span>{{.Blog.CreatedAt.Format "January 2, 2006"}}</span>
                </div>
            </header>

            <div class="max-w-none text-body">
                {{.Blog.Content | safeHTML}}
            </div>

            <footer class="mt-12 pt-6 border-t border-gray-100">
                <div class="flex justify-between items-center">
                    <a href="/blog" class="text-body text-gray-600 hover:text-gray-900 font-medium">← Back to all posts</a>
                   
                </div>
            </footer>
        </article>
    </main>

    {{template "footer.html" .}}
</body>
</html>
