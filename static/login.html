<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Dosis:wght@500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <article class="min-h-screen flex items-center justify-center bg-gray-100">
      <div class="mx-auto p-8 max-w-md bg-white rounded-lg shadow-lg flex flex-col gap-6">
        <form action="{{.Action}}" method="post" class="flex flex-col gap-4">
            <h1 class="text-2xl font-semibold text-center mb-2">{{.Title}}</h1>
            <div class="flex flex-col">
              <label for="username" class="mb-1 font-medium">Username:</label>
              <input id="username" class="border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" type="text" name="username" />
            </div>

            <div class="flex flex-col">
              <label for="password" class="mb-1 font-medium">Password:</label>
              <input id="password" class="border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" type="password" name="password" />
            </div>

            <button class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Login</button>
        </form>
      </div>
    </article>
  </body>
</html>
